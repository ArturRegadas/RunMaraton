<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Confetes nas Laterais</title>
<style>
  body {
    display: flex;
    height: 100vh;
    justify-content: center;
    align-items: center;
    background: #222;
    margin: 0;
  }

  button {
    padding: 12px 24px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #4caf50;
    color: white;
    position: relative;
  }

  .confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background-color: #fce18a;
    opacity: 0.9;
    z-index: 9999;
    pointer-events: none;
    will-change: transform, opacity;
    border-radius: 3px;
  }
</style>
</head>
<body>

<button id="confettiBtn">🎉 Soltar Confetes nas Laterais!</button>

<script>
  function createConfetti() {
    const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#3d94f6'];
    const count = 30;
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    for(let i = 0; i < count; i++) {
      const confetti = document.createElement('div');
      confetti.classList.add('confetti');
      confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

      // Escolhe lado aleatório: 0 = esquerda, 1 = direita
      const side = Math.random() < 0.5 ? 'left' : 'right';
      const startTop = Math.random() * vh * 0.8 + vh * 0.1; // de 10% até 90% da altura

      // Posiciona confete na lateral
      confetti.style.top = `${startTop}px`;
      confetti.style[side] = '0px';

      document.body.appendChild(confetti);

      // Distância que o confete vai se mover para dentro da tela (horizontal)
      const horizontalMove = (side === 'left' ? 1 : -1) * (50 + Math.random() * 150);

      // Distância que o confete vai cair (vertical)
      const verticalMove = 150 + Math.random() * 300;

      // Tempo da animação
      const animationDuration = 2500 + Math.random() * 1500;

      confetti.animate([
        { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
        { 
          transform: `translate(${horizontalMove}px, ${verticalMove}px) rotate(${Math.random() * 360}deg)`,
          opacity: 0
        }
      ], {
        duration: animationDuration,
        easing: 'ease-out',
        fill: 'forwards'
      });

      setTimeout(() => {
        confetti.remove();
      }, animationDuration);
    }
  }

  const btn = document.getElementById('confettiBtn');
  btn.addEventListener('click', () => {
    createConfetti();
  });
</script>

</body>
</html>
