<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Juiz Online</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#F59E0B", // amarelo
            background: "#18181B", // quase preto
            card: "#27272A", // cinza escuro
            inputBg: "#3F3F46", // cinza intermediário
          },
        },
      },
    };
  </script>

</head>
<body class="bg-background text-white min-h-screen flex items-center justify-center px-4">
  <div class="bg-card rounded-xl shadow-lg max-w-md w-full p-8">
    <h1 class="text-3xl font-bold mb-6 text-center text-primary" style="color: aliceblue;">Juiz Online</h1>

    <form class="space-y-6" action="/login" method="post">
      <div>
        <label for="email" class="block mb-1 font-semibold">Email</label>
        <input
          id="email"
          name="username"
          type="name"
          required
          placeholder="seuemail@exemplo.com"
          class="w-full bg-inputBg rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary text-white placeholder:text-gray-400"
        />
      </div>

      <div>
        <label for="password" class="block mb-1 font-semibold">Senha</label>
        <input
          id="password"
          name="password"
          type="password"
          required
          placeholder="••••••••"
          class="w-full bg-inputBg rounded-md px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary text-white placeholder:text-gray-400"
        />
      </div>

      <input
        type="submit"
        class="w-full bg-primary rounded-md py-3 font-semibold hover:bg-yellow-400 transition"
        value="Entrar"
      >
    </form>
    {{msg}}

    <p class="mt-6 text-center text-gray-400 text-sm">
      Não tem conta?
      <a href="#" class="text-primary hover:underline">Cadastre-se</a>
    </p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = e.target.email.value;
      const password = e.target.password.value;

      alert(`Tentativa de login\nEmail: ${email}\nSenha: ${password}`);
    });
  </script>
</body>
</html>
