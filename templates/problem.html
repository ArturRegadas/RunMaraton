<!DOCTYPE html>
<html lang="pt-br" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juiz Online - Estilo LeetCode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#1A1A1A',
              accent: '#F59E0B',
            },
          },
        },
      };
    </script>
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      #editor {
        height: 400px;
        width: 100%;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
  </head>
  <body class="bg-gray-100 dark:bg-zinc-900 text-gray-900 dark:text-white">
    <div class="max-w-7xl mx-auto p-4">
      <header class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">Juiz Online</h1>
        {{ended}}
        <select id="language-select"
              class="px-3 py-2 rounded border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-800 text-gray-900 dark:text-white"
              style="height: 40px; font-size: 15px;">
              <option value="c">C</option>
              <option value="cpp" selected>C++</option>
              <option value="python">Python</option>
            </select>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <!-- Descrição do problema -->
        <iframe
          class="lg:col-span-1 bg-white dark:bg-zinc-800 rounded-xl p-4 shadow"
          src="{{ url_for('static', filename=filePdf) }}"
          width="100%"
          height="555px"
          style="margin: 0px; border-radius: 4px; border: none; width: 520px;"
        ></iframe>

        <!-- Editor + Console -->
        <section class="lg:col-span-2 flex flex-col gap-4" style="margin-left: 150px;">
          <!-- ComboBox de linguagem -->

          <!-- Editor de código -->
          <div id="editor" class="rounded border border-zinc-300 dark:border-zinc-700"
            style="padding: 10px; background-color: #1e1e1e;"></div>

          <!-- Botão Submeter -->
          <button onclick="submitCode()" class="self-start bg-accent text-white px-6 py-2 rounded hover:bg-yellow-500">
            Submeter
          </button>

          <!-- Área de saída -->
          <div class="bg-zinc-100 dark:bg-zinc-800 p-4 rounded shadow">
            <h3 class="font-semibold">Resultado</h3>
            <pre id="output" class="text-sm text-green-500 mt-2">{{result}}</pre>
          </div>
        </section>
      </div>
    </div>

    <script>

      // Carregando Monaco
      require.config({ paths: { vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs" } });

      require(["vs/editor/editor.main"], function () {
        const langSelect = document.getElementById("language-select");
        const initialLang = langSelect.value;

        window.editor = monaco.editor.create(document.getElementById("editor"), {
          value: getDefaultTemplate(initialLang),
          language: initialLang,
          theme: "vs-dark",
          automaticLayout: true,
        });

        langSelect.addEventListener("change", function () {
          const newLang = this.value;
          const model = editor.getModel();
          monaco.editor.setModelLanguage(model, newLang);
          editor.setValue(getDefaultTemplate(newLang));
        });
      });

      // Código padrão por linguagem
      function getDefaultTemplate(lang) {
        switch (lang) {
          case "c":
            return `#include <stdio.h>\n\nint soma(int a, int b) {\n  return a + b;\n}`;
          case "cpp":
            return `// Digite seu código aqui\nint soma(int a, int b) {\n  return a + b;\n}`;
          case "python":
            return `# Digite seu código aqui\ndef soma(a, b):\n    return a + b`;
          default:
            return "{{code}}";
        }
      }

    </script>
  </body>
</html>
